<style>
        body {
            background-color: #071325;
            overflow-x: hidden;
        }

        .starry-bg {
            background: radial-gradient(circle at 50% 50%, #102a54 0%, #071325 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .swirl-decoration {
            position: absolute;
            width: 600px;
            height: 600px;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(233,195,58,0.05) 180deg, transparent 360deg);
            filter: blur(80px);
            animation: rotate-swirl 20s linear infinite;
        }

        @keyframes rotate-swirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass-card {
            backdrop-filter: blur(24px);
            border: 1px solid rgba(174, 206, 186, 0.15);
            background: rgba(20, 32, 50, 0.7);
        }

        .est-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom Scrollbar */

        ::-webkit-scrollbar-track { background: #071325; }

<body class="font-body-md text-on-surface antialiased min-h-screen flex flex-col items-center justify-center relative px-margin-mobile">
<!-- Atmospheric Background Elements -->
<div class="starry-bg"></div>
<div class="swirl-decoration -top-48 -left-48"></div>

</div>

</div>
<!-- Login Card -->
<section class="glass-card rounded-xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
<!-- Subtle Canvas Texture Overlay -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');"></div>
<form action="otp-verify.html" class="space-y-6 relative z-10">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-secondary block uppercase tracking-widest" for="username">

                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-4 pl-12 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all placeholder:text-outline/40" id="username" name="username" placeholder="Registry Name" type="text"/>
</div>
</div>
<!-- Password Field -->

<label class="font-label-sm text-label-sm text-secondary block uppercase tracking-widest" for="password">

<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>

<!-- Micro-interaction Script -->
<script>
        // Subtle mouse tracking for the background swirls
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const swirls = document.querySelectorAll('.swirl-decoration');
            swirls.forEach((swirl, index) => {
                const modifier = (index + 1) * 20;
                swirl.style.transform = `translate(${x * modifier}px, ${y * modifier}px) rotate(${x * 360}deg)`;
            });
        });

        // Button Ripple Effect
        const btn = document.querySelector('button[type="submit"]');
        btn.addEventListener('click', function(e) {
            let ripple = document.createElement('span');
            ripple.classList.add('absolute', 'bg-white/30', 'rounded-full', 'pointer-events-none', '-translate-x-1/2', '-translate-y-1/2');
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = e.clientX - rect.left + 'px';
            ripple.style.top = e.clientY - rect.top + 'px';
            ripple.style.animation = 'ripple 600ms linear';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
<style>
        @keyframes ripple {
            from { transform: scale(0); opacity: 1; }
            to { transform: scale(4); opacity: 0; }
        }
    </style>
